<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Watch</title>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial}
.container{display:flex;gap:20px;padding:20px}
.player{flex:3}
.sidebar{flex:1}
iframe{width:100%;height:400px;border-radius:10px}
.video{margin-bottom:15px;cursor:pointer}
.video img{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="container">

<div class="player">
  <iframe id="player" src="" frameborder="0" allowfullscreen></iframe>
</div>

<div class="sidebar">

<div class="video" onclick="go('UDVLn4Xvyz8')">
  <img src="https://img.youtube.com/vi/UDVLn4Xvyz8/hqdefault.jpg">
</div>

<div class="video" onclick="go('AwoHg88jaag')">
  <img src="https://img.youtube.com/vi/AwoHg88jaag/hqdefault.jpg">
</div>

<div class="video" onclick="go('IAaQ1yNJ_74')">
  <img src="https://img.youtube.com/vi/IAaQ1yNJ_74/hqdefault.jpg">
</div>

</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("v");

document.getElementById("player").src =
  "https://www.youtube.com/embed/" + id;

function go(id){
  window.location.href = "watch.html?v=" + id;
}
</script>

</body>
</html>
